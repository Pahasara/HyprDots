# ~/.config/wireplumber/wireplumber.conf.d/51-alsa-tweaks.conf
# ALSA and device-specific optimizations

wireplumber.properties = {
    session.suspend-timeout-seconds = 0   # Never suspend devices
}

monitor.alsa.rules = [
    # Output devices (speakers / headphones)
    {
        matches = [ { node.name = "~alsa_output.*" } ]
        actions = {
            update-props = {
                api.alsa.period-size  = 1024
                api.alsa.period-num   = 2
                api.alsa.headroom     = 1024
                audio.format          = "S16LE"
                audio.rate            = 48000
                audio.allowed-rates   = [ 44100 48000 88200 96000 ]
                audio.channels        = 2
                audio.position        = [ FL FR ]
                api.alsa.disable-mmap   = false
                api.alsa.disable-batch  = false
                api.alsa.disable-tsched = false
                api.alsa.start-delay    = 0
                node.pause-on-idle              = false
                session.suspend-timeout-seconds = 0
                dither.noise = 2
            }
        }
    },
    # Input devices (microphone)
    {
        matches = [ { node.name = "~alsa_input.*" } ]
        actions = {
            update-props = {
                api.alsa.period-size  = 1024
                api.alsa.period-num   = 2
                api.alsa.headroom     = 1024
                audio.format          = "S16LE"
                audio.rate            = 48000
                node.pause-on-idle              = false
                session.suspend-timeout-seconds = 0
                dither.noise = 2
            }
        }
    }
]

monitor.bluez.rules = [
    {
        matches = [ { device.name = "~bluez_card.*" } ]
        actions = {
            update-props = {
                bluez5.auto-connect = [ hfp_hf hsp_hs a2dp_sink ]
                bluez5.hw-volume    = [ hfp_hf hsp_hs a2dp_sink ]
                session.suspend-timeout-seconds = 0
                dither.noise = 2
            }
        }
    }
]

