# github.com/pahasara/HyprDots

# ──────────────────────────────────────────────────────────────
# PERMISSIONS
# ──────────────────────────────────────────────────────────────
permission = /usr/bin/grim,                         screencopy, allow
permission = /usr/bin/hyprpicker,                   screencopy, allow
permission = /usr/bin/hyprlock,                     screencopy, allow
permission = /usr/lib/xdg-desktop-portal-hyprland,  screencopy, allow


# ──────────────────────────────────────────────────────────────
# LAYERS
# ──────────────────────────────────────────────────────────────
layerrule {
    name = overlay-blur
    match:namespace = waybar|rofi|notifications
    blur = on
    ignore_alpha = 0.1
}

layerrule {
    name = rofi-dim
    match:namespace = rofi
    dim_around = on
}


# ──────────────────────────────────────────────────────────────
# WORKSPACE ROUTING
# ──────────────────────────────────────────────────────────────
windowrule {
    name = ws-browsing
    match:class = .*(zen|firefox|[Bb]rowser).*
    workspace = 2
}

windowrule {
    name = ws-media-productivity
    match:class = .*(mpv|vlc|gimp|code|obsidian|libreoffice|kdenlive|Foliate|rider).*
    workspace = 3
}

windowrule {
    name = ws-gaming
    match:class = .*(steam|steam_app|cs2|dota2|zoom|VirtualBox|Lutris|spotify|okular|dolphin).*
    workspace = 4
}

windowrule {
    name = ws-proton-games
    match:xdg_tag = proton-game
    workspace = 4
}

windowrule {
    name = ws-social
    match:class = .*(vesktop|discord|signal|GitHub|telegram|qbittorrent).*
    workspace = 10
}


# ──────────────────────────────────────────────────────────────
# FLOATING WINDOWS
# ──────────────────────────────────────────────────────────────
windowrule {
    name = float-term-ws1
    match:class = kitty
    match:workspace = 1
    float = on
}

windowrule {
    name = float-by-title
    match:title = .*(Okular|About|Picture-in-Picture|Open (File|Folder|Document)|Choose Files).*
    float = on
}

windowrule {
    name = float-media-apps
    match:class = .*(zen|firefox|mpv|vlc|imv|nomacs|Lutris|Lollypop|pupgui2).*
    float = on
}

windowrule {
    name = float-config-apps
    match:class = .*(nwg-look|qt[56]ct|zathura|qbittorrent|easyeffects|MissionCenter).*
    float = on
}

windowrule {
    name = float-desktop-utils
    match:class = .*(gnome|kde|keditfiletype).*
    match:title = negative:.*Kdenlive.*
    float = on
}

windowrule {
    name = float-system-apps
    match:class = (Zoom Workplace|xdg-desktop-portal-gtk|VirtualBox|waypaper).*
    float = on
}


# ──────────────────────────────────────────────────────────────
# CENTERING & TILING
# ──────────────────────────────────────────────────────────────
windowrule {
    name = center-apps
    match:class = .*(kitty|MissionCenter|pupgui2|Lollypop|Lutris|mpv|discord|imv|nomacs|easyeffects|nwg-look|qt[56]ct|zathura|gnome|kde).*
    center = on
}

windowrule {
    name = tile-browsers
    match:title = (Zen Browser|Mozilla Firefox|qBittorrent).*
    tile = on
}

windowrule {
    name = tile-kompare
    match:class = kompare.*
    match:title = Kompare
    tile = on
}


# ──────────────────────────────────────────────────────────────
# FOCUS & IDLE
# ──────────────────────────────────────────────────────────────
windowrule {
    name = stay-focused-pinned
    match:class = .*(hyprland-dialog|hyprland-donate-screen).*
    stay_focused = on
    pin = on
}

windowrule {
    name = stay-focused-about
    match:title = About.*
    stay_focused = on
}

windowrule {
    name = idle-inhibit-fullscreen
    match:class = .*
    idle_inhibit = fullscreen
}

windowrule {
    name = idle-inhibit-music
    match:class = .*Lollypop.*
    idle_inhibit = focus
}


# ──────────────────────────────────────────────────────────────
# MISC
# ──────────────────────────────────────────────────────────────
windowrule {
    name = no-blur-xwayland
    match:xwayland = true
    no_blur = on
}

windowrule {
    name = borderless-imv
    match:class = imv
    border_size = 0
}

windowrule {
    name = pin-missioncenter
    match:class = .*MissionCenter.*
    pin = on
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}


# ──────────────────────────────────────────────────────────────
# SIZING
# ──────────────────────────────────────────────────────────────
windowrule {
    name = size-large
    match:class = .*(Lutris|Lollypop|vesktop|discord|okular|MissionCenter).*
    size = (monitor_w*0.64) (monitor_h*0.75)
}

windowrule {
    name = size-large-desktop
    match:class = .*(gnome|kde).*
    match:title = negative:.*(Dolphin|About).*
    size = (monitor_w*0.64) (monitor_h*0.75)
}

windowrule {
    name = size-terminal
    match:title = .*(kitty|ProtonUp-Qt -).*
    size = (monitor_w*0.48) (monitor_h*0.56)
}

windowrule {
    name = size-image-viewers
    match:class = .*(imv|nomacs).*
    size = (monitor_w*0.65) (monitor_h*0.65)
}

windowrule {
    name = size-pdf
    match:class = .*zathura.*
    size = (monitor_w*0.72) (monitor_h*0.72)
}

windowrule {
    name = size-audio
    match:class = .*easyeffects.*
    size = (monitor_w*0.78) (monitor_h*0.85)
}

windowrule {
    name = size-pip
    match:title = Picture-in-Picture
    size = (monitor_w*0.55) (monitor_h*0.55)
}

windowrule {
    name = size-theme
    match:class = .*(qt[65]ct|nwg-look).*
    size = (monitor_w*0.55) (monitor_h*0.65)
}


# ──────────────────────────────────────────────────────────────
# KDE
# ──────────────────────────────────────────────────────────────
windowrule {
    name = kde-polkit
    match:class = org.kde.polkit-kde-authentication-agent-1
    stay_focused = on
}

windowrule {
    name = kompare-dialogs
    match:class = kompare.*
    match:title = .*(About|Select|Compare).*
    float = on
}

windowrule {
    name = kde-tile
    match:class = .*(kid3|kdenlive).*
    match:title = negative:.*(Project|Open|Find|Configure|About).*
    tile = on
}


# ──────────────────────────────────────────────────────────────
# DIALOGS
# ──────────────────────────────────────────────────────────────
windowrule {
    name = xdg-portal
    match:class = xdg-desktop-portal-gtk
    center = on
    size = (monitor_w*0.54) (monitor_h*0.68)
}

windowrule {
    name = save-dialogs
    match:title = Save As.*
    center = on
    size = (monitor_w*0.54) (monitor_h*0.68)
}


# ──────────────────────────────────────────────────────────────
# BROWSERS
# ──────────────────────────────────────────────────────────────
windowrule {
    name = browser-focus
    match:class = .*(zen|firefox).*
    focus_on_activate = on
}

windowrule {
    name = browser-focus-main
    match:class = .*(zen|firefox).*
    match:title = negative:.*(Zen Browser|Mozilla Firefox).*
    stay_focused = off
}


# ──────────────────────────────────────────────────────────────
# UTILITIES
# ──────────────────────────────────────────────────────────────
windowrule {
    name = kcolorchooser
    match:class = .*kcolorchooser.*
    move = (monitor_w*0.51) (monitor_h*-0.11)
}

windowrule {
    name = timecanvas
    match:class = TimeCanvas
    float = on
    center = on
}

windowrule {
    name = waypaper
    match:class = waypaper
    opacity = 0.9
    size = (monitor_w*0.505) (monitor_h*0.58)
    move = (monitor_w*0.49) (monitor_h*0.41)
}


# ──────────────────────────────────────────────────────────────
# qBITTORRENT
# ──────────────────────────────────────────────────────────────
windowrule {
    name = qbittorrent-dialogs
    match:class = .*qBittorrent.*
    match:title = negative:qBittorrent.*
    center = on
    stay_focused = on
}

# ──────────────────────────────────────────────────────────────
# PROTONVPN
# ──────────────────────────────────────────────────────────────
windowrule {
    name = protonvpn-main
    match:class = protonvpn.*
    float = on
    center = on
}

windowrule {
    name = protonvpn-notification
    match:class = protonvpn.*
    match:title = Active connection.*
    size = (monitor_w*0.30) (monitor_h*0.17)
}

windowrule {
    name = protonvpn-window
    match:class = protonvpn.*
    match:title = Proton VPN
    move = (monitor_w*0.778) (monitor_h*0.035)
}


# ──────────────────────────────────────────────────────────────
# VIRTUALBOX
# ──────────────────────────────────────────────────────────────
windowrule {
    name = virtualbox-vm
    match:class = VirtualBox Machine
    fullscreen = on
}

windowrule {
    name = virtualbox-settings
    match:class = VirtualBox
    match:title = Settings.*
    center = on
}


# ──────────────────────────────────────────────────────────────
# GIMP
# ──────────────────────────────────────────────────────────────
windowrule {
    name = gimp-export
    match:class = file-png
    match:title = Export.*
    float = on
}

windowrule {
    name = gimp-quit
    match:class = gimp
    match:title = Quit.*
    stay_focused = on
}


# ──────────────────────────────────────────────────────────────
# DOLPHIN
# ──────────────────────────────────────────────────────────────
windowrule {
    name = dolphin-float
    match:class = .*dolphin.*
    float = on
}

windowrule {
    name = dolphin-center
    match:class = .*dolphin.*
    match:title = negative:.*Properties.*
    center = on
}

windowrule {
    name = dolphin-home
    match:class = .*dolphin.*
    match:title = Home.*
    size = (monitor_w*0.7) (monitor_h*0.8)
}

windowrule {
    name = dolphin-operations
    match:class = .*dolphin.*
    match:title = .*(Copy|Moving|Compress|Extract).*
    move = (monitor_w*0.005) (monitor_h*0.05)
}

windowrule {
    name = dolphin-confirmations
    match:class = org.kde.dolphin
    match:title = .*(File|Delete).*
    stay_focused = on
}


# ──────────────────────────────────────────────────────────────
# STEAM
# ──────────────────────────────────────────────────────────────
windowrule {
    name = steam-games
    match:class = .*(steam_app|cs2|dota2).*
    content = game
}

windowrule {
    name = steam-fullscreen
    match:content = 3
    match:title = negative:.*(Launcher|Options|Setup|Working).*
    fullscreen = on
}

windowrule {
    name = steam-dialogs
    match:class = steam
    match:title = negative:Steam
    float = on
}

windowrule {
    name = steam-signin
    match:class = steam
    match:title = Sign.*
    center = on
}

windowrule {
    name = steam-rounding
    match:float = 1
    match:class = steam
    rounding = 1
}

windowrule {
    name = steam-no-focus-events
    match:class = steam
    suppress_event = activatefocus
}


# ──────────────────────────────────────────────────────────────
# JETBRAINS
# ──────────────────────────────────────────────────────────────
windowrule {
    name = jetbrains-welcome
    match:class = jetbrains.*
    match:title = Welcome.*
    float = on
    center = on
    size = (monitor_w*0.42) (monitor_h*0.40)
}

windowrule {
    name = jetbrains-float-style
    match:float = 1
    match:class = jetbrains.*
    rounding = 7
    border_color = rgba(56585B99)
}

windowrule {
    name = jetbrains-confirmations
    match:class = jetbrains.*
    match:title = Confirm.*
    stay_focused = on
}

# vim: set ft=hyprlang :
