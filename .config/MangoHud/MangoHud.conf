############################################
#           MANGOHUD CONFIG
############################################

### General
legacy_layout           = false
round_corners           = 0
background_alpha        = 0.5
background_color        = 000000
font_size               = 18
font_file               = ~/.local/share/fonts/Montserrat/static/Montserrat-Bold.ttf
text_color              = FFFFFF
text_outline
text_outline_color      = 000000
text_outline_thickness  = 1.5
position                = top-left

### Hardware Identification
pci_dev                 = 0:00:02.0

### Display Layout & Monitoring
horizontal
hud_no_margin
gpu_text                = GPU
cpu_text                = CPU

# Hardware stats
gpu_stats
gpu_core_clock
cpu_stats
cpu_temp
ram

# Engine and FPS info
# engine_version          # This shows "DXVK" or "Vulkan"
engine_short_names      # Keeps it compact (e.g., "DXVK" instead of "DXVK 2.3.1")
fps
frame_timing = 1        # Setting this to 0 shows the "ms" as text instead of a graph

#############################################
# COLOR CUSTOMIZATION
#############################################
cpu_color               = 00AADD
gpu_color               = 38CF38
ram_color               = 9146FF
fps_color_change
fps_color               = B22222,FDFD09,39F900

#############################################
# FPS LIMITING
#############################################
fps_limit_method        = late
toggle_fps_limit        = Shift_L+F1
fps_limit               = 60,30,0
